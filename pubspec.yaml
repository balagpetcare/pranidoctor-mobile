name: pranidoctor_mobile
description: Prani Doctor — customer & doctor mobile app (Bangladesh).
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  dio: ^5.9.2
  go_router: ^17.2.3
  flutter_secure_storage: ^10.1.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  url_launcher: ^6.3.1
  file_picker: ^10.3.8
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.6
  video_player: ^2.9.5
  video_thumbnail: ^0.5.6
  connectivity_plus: ^6.1.4
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/brand/app_icons/prani_doctor_app_icon.png
  adaptive_icon_background: "#EAF7EF"
  adaptive_icon_foreground: assets/brand/app_icons/prani_doctor_app_icon.png
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/brand/logos/
    - assets/brand/app_icons/
    - assets/brand/illustrations/
    - assets/images/home/
    - assets/images/onboarding/
