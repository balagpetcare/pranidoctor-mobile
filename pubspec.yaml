name: pranidoctor_mobile
description: Prani Doctor — customer & doctor mobile app (Bangladesh).
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  dio: ^5.9.2
  go_router: ^17.2.3
  flutter_secure_storage: ^10.1.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/brand/app_icons/prani_doctor_app_icon.png
  adaptive_icon_background: "#EAF7EF"
  adaptive_icon_foreground: assets/brand/app_icons/prani_doctor_app_icon.png
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/brand/logos/
    - assets/brand/app_icons/
    - assets/brand/illustrations/
    - assets/images/home/
